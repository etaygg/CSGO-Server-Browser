<!doctype html>
<html lang="en">
  

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="styles.css" />

  <body class="container">
    <div
      class="container d-flex justify-content-between py-4 align-items-center"
    >
      <h1 class="text-start title">Settings</h1>
      <a href="index.html" class="btn btnConnect">Back</a>
    </div>
    <div class="sets">
      <div class="mb-3">
        <label for="apikey" class="form-label" id="apiKeyInp">API Key</label>
        <input
          type="password"
          class="form d-block lightBorder darkBorder serverList"
          id="apikey"
          placeholder="Enter your API key"
        />
        <label for="serverCount" class="form-label"
          >Number of Servers to show</label
        >
        <input
          type="number"
          class="form d-block lightBorder darkBorder serverList"
          id="serverCount"
          placeholder="Enter number of servers"
        />
        <button class="btn btnConnect mt-4" id="saveSettings" onclick="saveSettings()">
          Save Settings
        </button>
      </div>
    </div>
    <div class="alert d-none" id="alert"></div>
    <script src="neutralino.js"></script>
  <script src="js/main.js"></script>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
    integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
    crossorigin="anonymous"
  ></script>
</html>
